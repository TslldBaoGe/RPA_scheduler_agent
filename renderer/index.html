<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPA Agent</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .container {
      width: 100%;
      max-width: 550px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }
    
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .logo {
      width: 40px;
      height: 40px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .logo svg {
      width: 24px;
      height: 24px;
    }
    
    .header-text h1 {
      font-size: 18px;
      font-weight: 600;
    }
    
    .header-text p {
      font-size: 12px;
      opacity: 0.8;
    }
    
    .status-bar {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      gap: 10px;
    }
    
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #94a3b8;
      transition: background 0.3s;
    }
    
    .status-dot.connected {
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
    }
    
    .status-dot.connecting {
      background: #f59e0b;
      animation: pulse 1s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .status-text {
      font-size: 13px;
      color: #64748b;
    }
    
    .info-section {
      padding: 16px 20px;
      border-bottom: 1px solid #e2e8f0;
    }
    
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    
    .info-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .info-label {
      font-size: 11px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .info-value {
      font-size: 13px;
      color: #334155;
      font-weight: 500;
    }
    
    .log-section {
      padding: 16px 20px;
    }
    
    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    
    .log-title {
      font-size: 14px;
      font-weight: 600;
      color: #334155;
    }
    
    .clear-btn {
      background: none;
      border: none;
      color: #64748b;
      font-size: 12px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
    }
    
    .clear-btn:hover {
      background: #f1f5f9;
    }
    
    .log-container {
      background: #1e293b;
      border-radius: 8px;
      padding: 12px;
      height: 180px;
      overflow-y: auto;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 12px;
      line-height: 1.6;
    }
    
    .log-entry {
      color: #94a3b8;
      word-break: break-all;
    }
    
    .log-entry.info { color: #38bdf8; }
    .log-entry.success { color: #4ade80; }
    .log-entry.error { color: #f87171; }
    .log-entry.warning { color: #fbbf24; }
    
    .actions {
      padding: 16px 20px;
      display: flex;
      gap: 12px;
      background: #f8fafc;
    }
    
    .btn {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    
    .btn-secondary {
      background: #e2e8f0;
      color: #475569;
    }
    
    .btn-secondary:hover:not(:disabled) {
      background: #cbd5e1;
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    /* Scrollbar */
    .log-container::-webkit-scrollbar {
      width: 6px;
    }
    
    .log-container::-webkit-scrollbar-track {
      background: transparent;
    }
    
    .log-container::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>RPA Agent</h1>
        <p>任务执行代理</p>
      </div>
    </div>
    
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">未连接</span>
    </div>
    
    <div class="info-section">
      <div class="info-grid">
        <div class="info-item">
          <span class="info-label">Agent ID</span>
          <span class="info-value" id="agentId">-</span>
        </div>
        <div class="info-item">
          <span class="info-label">Agent 名称</span>
          <span class="info-value" id="agentName">-</span>
        </div>
        <div class="info-item">
          <span class="info-label">主机名</span>
          <span class="info-value" id="hostname">-</span>
        </div>
        <div class="info-item">
          <span class="info-label">平台</span>
          <span class="info-value" id="platform">-</span>
        </div>
      </div>
    </div>
    
    <div class="log-section">
      <div class="log-header">
        <span class="log-title">运行日志</span>
        <button class="clear-btn" id="clearBtn">清空</button>
      </div>
      <div class="log-container" id="logContainer"></div>
    </div>
    
    <div class="actions">
      <button class="btn btn-primary" id="startBtn">启动</button>
      <button class="btn btn-secondary" id="stopBtn" disabled>停止</button>
    </div>
  </div>

  <script>
    const statusDot = document.getElementById('statusDot')
    const statusText = document.getElementById('statusText')
    const agentIdEl = document.getElementById('agentId')
    const agentNameEl = document.getElementById('agentName')
    const hostnameEl = document.getElementById('hostname')
    const platformEl = document.getElementById('platform')
    const logContainer = document.getElementById('logContainer')
    const startBtn = document.getElementById('startBtn')
    const stopBtn = document.getElementById('stopBtn')
    const clearBtn = document.getElementById('clearBtn')
    
    let isRunning = false
    let isConnected = false
    
    // 监听日志
    window.api.onLog((message) => {
      addLog(message)
    })
    
    // 监听状态
    window.api.onStatus((status) => {
      isRunning = status.isRunning
      isConnected = status.connected
      updateUI()
    })
    
    // 监听信息
    window.api.onInfo((info) => {
      agentIdEl.textContent = info.agentId.substring(0, 8) + '...'
      agentNameEl.textContent = info.agentName
      hostnameEl.textContent = info.hostname
      platformEl.textContent = info.platform
    })
    
    // 监听清空日志
    window.api.onClearLog(() => {
      logContainer.innerHTML = ''
    })
    
    // 添加日志
    function addLog(message) {
      const entry = document.createElement('div')
      entry.className = 'log-entry'
      
      if (message.includes('成功') || message.includes('完成')) {
        entry.classList.add('success')
      } else if (message.includes('错误') || message.includes('失败')) {
        entry.classList.add('error')
      } else if (message.includes('警告')) {
        entry.classList.add('warning')
      } else if (message.includes('已连接') || message.includes('已注册')) {
        entry.classList.add('info')
      }
      
      entry.textContent = message
      logContainer.appendChild(entry)
      logContainer.scrollTop = logContainer.scrollHeight
    }
    
    // 更新 UI
    function updateUI() {
      if (isRunning) {
        startBtn.disabled = true
        stopBtn.disabled = false
        
        if (isConnected) {
          statusDot.className = 'status-dot connected'
          statusText.textContent = '已连接'
        } else {
          statusDot.className = 'status-dot connecting'
          statusText.textContent = '连接中...'
        }
      } else {
        startBtn.disabled = false
        stopBtn.disabled = true
        statusDot.className = 'status-dot'
        statusText.textContent = '未连接'
      }
    }
    
    // 启动按钮
    startBtn.addEventListener('click', async () => {
      await window.api.startAgent()
    })
    
    // 停止按钮
    stopBtn.addEventListener('click', async () => {
      await window.api.stopAgent()
    })
    
    // 清空日志
    clearBtn.addEventListener('click', async () => {
      await window.api.clearLog()
    })
    
    // 初始化
    updateUI()
  </script>
</body>
</html>
